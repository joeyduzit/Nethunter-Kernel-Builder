name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat  ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}

      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}

      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig

      withKernelSU: ${{ matrix.repos.withKernelSU }}
    steps:
      - name: "✨ Create working dir"
        run: mkdir -p $kernelDir

      - name: "⭐ Install prerequisites"
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools
          sudo apt-get install -y libc6-i386 lib32z1 lib32stdc++6 libgcc-s1:i386
          sudo apt-get install -y libc6:i386 libstdc++6:i386
          sudo apt-get install -y gcc-multilib g++-multilib

          which arm-linux-gnueabi-gcc || echo "Compiler not in PATH, locating..."
          
      - name: "🌟 Clone kernel source => (${{ env.kernelRepo }})"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --recursive --branch $kernelBranch $kernelRepo $kernelName --depth=1

      - name: "💫 Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          SYSTEM_PATH="$PATH"

          ARM32_GCC_PATH=$(which arm-linux-gnueabi-gcc 2>/dev/null || dpkg -L gcc-arm-linux-gnueabi 2>/dev/null | grep -E 'bin/arm-linux-gnueabi-gcc$' | head -1)
          if [ -n "$ARM32_GCC_PATH" ]; then
            ARM32_BIN_DIR=$(dirname "$ARM32_GCC_PATH")
            export PATH="$ARM32_BIN_DIR:$PATH"
            echo "ARM32 compiler found at: $ARM32_BIN_DIR"
          else
            echo "Warning: arm-linux-gnueabi-gcc not found"
          fi
          
          toolchains_num="$(echo $toolchains | jq 'length')"
          echo $toolchains_num
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")
            git clone --recursive --branch $branch $repo $name --depth=1
            echo "TOOLCHAIN_PATH_$i=$(pwd)/$name/bin" >> $GITHUB_ENV
          done
          
          echo "PATH=$SYSTEM_PATH" >> $GITHUB_ENV
          echo "PATH Variable: $SYSTEM_PATH"

      - name: "😎 Set args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
          extraParams: "${{ toJSON(matrix.repos.extraParams) }}"
          THREAD: $(nproc --all)
        run: |
          echo "PATH Variable: $PATH"
          ARCH=$(echo $params | jq -r ".ARCH")
          CROSS_COMPILE=$(echo $params | jq -r ".CROSS_COMPILE")
          CROSS_COMPILE_COMPAT=$(echo $params | jq -r ".CROSS_COMPILE_COMPAT")
          CROSS_COMPILE_ARM32=$(echo $params | jq -r ".CROSS_COMPILE_ARM32")
          CLANG_TRIPLE=$(echo $params | jq -r ".CLANG_TRIPLE")
          AR=$(echo $params | jq -r ".AR")
          CC_TARGET=$(echo $params | jq -r ".CC")   # keep separately as target CC
          echo "ARCH=$ARCH" >> $GITHUB_ENV

          # Force host tools to use system gcc/g++
          args="-j$(nproc --all) HOSTCC=/usr/bin/gcc HOSTCXX=/usr/bin/g++ CC_FOR_BUILD=/usr/bin/gcc \
          LD=/usr/bin/ld HOSTLD=/usr/bin/ld NATIVELD=/usr/bin/ld"

          # O= output dir
          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p $(pwd)/${{ env.OUT_DIR }}
            args="$args O=$(pwd)/${{ env.OUT_DIR }}"
          fi

          if [ -n "$ARCH" ]; then
            args="$args ARCH=$ARCH"
          fi

          if [ -n "$CROSS_COMPILE" ]; then
            args="$args CROSS_COMPILE=$CROSS_COMPILE"
          fi

          if [ -n "$CLANG_TRIPLE" ]; then
            args="$args CLANG_TRIPLE=$CLANG_TRIPLE"
          fi

          if [ -n "$CROSS_COMPILE_ARM32" ]; then
            ARM32_COMPILER=$(which arm-linux-gnueabi-gcc | sed 's/-gcc$//')
            args="$args CROSS_COMPILE_ARM32=${ARM32_COMPILER}-"
          fi

          if [ -n "$AR" ]; then
            args="$args AR=$AR"
          fi

          # Do NOT append CC (target compiler) into the global args, keep it separate
          if [ -n "$CC_TARGET" ] && [ "$CC_TARGET" != "null" ]; then
            echo "Using target CC: $CC_TARGET" >&2
            echo "CC_TARGET=$CC_TARGET" >> $GITHUB_ENV
          fi

          # Defensive: suppress Clang incompatible-library-redeclaration being treated as an error
          # (only if you still hit the clang redeclaration problem)
          args="$args KCFLAGS=-Wno-error=incompatible-library-redeclaration -Wno-incompatible-library-redeclaration"

          echo "args=$args" >> $GITHUB_OUTPUT
          extra_params=$(echo $extraParams | jq -r ' to_entries[] | select(.value != "") | "\(.key)=\(.value)"' | tr "\n" " " | sed 's/ $//')
          echo "args=$args $extra_params" >> $GITHUB_OUTPUT

      - name: "😋 Update KernelSU"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        if: ${{ env.withKernelSU == 'true' }}
        run: |
          if [ -d "./KernelSU" ]; then
            rm -rf "./KernelSU"
          fi
          if [ -d "./drivers/kernelsu" ]; then
            rm -rf "./drivers/kernelsu"
          fi

          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

          echo -e "\nCONFIG_KPROBES=y" >> ./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "\nCONFIG_HAVE_KPROBES=y" >> ./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "\nCONFIG_KPROBE_EVENTS=y" >> ./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }}

          cat ./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }}

      - name: "👍 Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "PATH Variable: $PATH"
          if [ -n "${CC_TARGET}" ]; then
            make ${{ steps.generate-args.outputs.args }} CC=${CC_TARGET} ${{ env.DEFCONFIG_NAME }}
          else
            make ${{ steps.generate-args.outputs.args }} ${{ env.DEFCONFIG_NAME }}
          fi

      - name: "🏴‍☠️ Before Action "
        env:
            args: ${{ steps.generate-args.outputs.args }}
        working-directory: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}
        run: |
          echo "args ---> ${args}"
          echo "current path ---> $(pwd)"
          echo "CONFIG_OF_CONFIGFS=y" >> .config
          echo "CONFIG_OF_OVERLAY=y" >> .config
          cat .config
          
      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "PATH Variable: $PATH"
          if [ -n "${CC_TARGET}" ]; then
            make ${{ steps.generate-args.outputs.args }} CC=${CC_TARGET}
          else
            make ${{ steps.generate-args.outputs.args }}
          fi

      - name: "🏴‍☠️ Post Action "
        run: |
          # make ${args} dtbs
          # make ${args} dtboimage
          pwd
          find ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/ -type f

      - name: "💛 Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image
          if-no-files-found: ignore
          retention-days: 7

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

      - name: "💜 Upload dtb"
        uses: actions/upload-artifact@v4
        with:
          name: dtb(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

      - name: "❤️ Upload dtbo.img"
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7